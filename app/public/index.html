<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Contacts</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="styles.css" />
<script>
  (function () {
    try {
      var saved = localStorage.getItem('contacts-theme');
      if (saved === 'light' || saved === 'dark') {
        document.documentElement.setAttribute('data-theme', saved);
      }
    } catch (e) {}
  })();
</script>
</head>
<body>
  <div class="app" id="app">

    <!-- LIST PANE -->
    <section class="pane pane-list" id="listPane">
      <header class="list-header">
        <h1>Contacts</h1>
        <div class="header-actions">
          <button class="icon-btn" id="themeBtn" title="Toggle dark mode" aria-label="Toggle dark mode">◐</button>
          <button class="icon-btn" id="menuBtn" title="More" aria-label="More options">⋯</button>
        </div>
      </header>

      <div class="search-row">
        <input type="search" id="searchInput" placeholder="Search" autocomplete="off" />
      </div>

      <div class="list-scroll" id="listScroll">
        <div id="contactList" class="contact-list"></div>
        <div id="emptyState" class="empty-state" hidden>
          <p>No contacts yet</p>
          <span>Tap + to add your first contact</span>
        </div>
      </div>

      <button class="fab" id="addBtn" title="Add contact" aria-label="Add contact">+</button>
    </section>

    <!-- DETAIL / EDIT PANE -->
    <section class="pane pane-detail" id="detailPane">
      <div id="detailEmpty" class="detail-empty">
        <span>Select a contact</span>
      </div>
      <div id="detailView" class="detail-view" hidden></div>
      <form id="editForm" class="edit-form" hidden></form>
    </section>

  </div>

  <!-- Menu popover -->
  <div class="popover" id="menuPopover" hidden>
    <button data-action="export">Export backup</button>
    <label class="popover-file">
      Import backup
      <input type="file" id="importFile" accept="application/json" hidden />
    </label>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
