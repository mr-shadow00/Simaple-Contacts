name: simple-contacts
services:
  simple-contacts:
    image: node:20-alpine
    container_name: simple-contacts
    restart: unless-stopped
    working_dir: /app
    command: ["node", "server.js"]
    environment:
      - PORT=8080
      - DATA_DIR=/data
    ports:
      - target: 8080
        published: "8088"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/simple-contacts/app
        target: /app
      - type: bind
        source: /DATA/AppData/simple-contacts/data
        target: /data
    x-casaos:
      author: self
      category: self
      hostname: ""
      icon: ""
      index: /
      is_uncontrolled: false
      port_map: "8088"
      scheme: http
